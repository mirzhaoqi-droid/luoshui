<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedance 2.0 提示词万能工作台</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0b0f1a;
            --card: #161e31;
            --text: #e2e8f0;
            --accent: #10b981;
            --warning: #f59e0b;
        }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .sidebar { height: calc(100vh - 40px); overflow-y: auto; position: sticky; top: 20px; padding-right: 10px; }
        .section { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #1e293b; }
        h2 { font-size: 1.1rem; color: var(--primary); margin-top: 0; border-bottom: 1px solid #2d3748; padding-bottom: 10px; }
        h3 { font-size: 0.9rem; color: var(--warning); margin: 15px 0 8px 0; }

        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { background: #1e293b; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .tag:hover { border-color: var(--primary); }
        .tag.active { background: var(--primary); color: white; }
        .tag.camera { border-color: #3b82f6; }
        .tag.style { border-color: #ec4899; }

        .main-panel { display: flex; flex-direction: column; gap: 20px; }
        .input-box { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #1e293b; }
        label { display: block; font-size: 0.9rem; margin-bottom: 8px; color: #94a3b8; }
        input, textarea { width: 100%; background: #020617; border: 1px solid #2d3748; color: white; padding: 12px; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 15px; }
        textarea { height: 120px; color: var(--accent); font-family: monospace; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-copy { background: var(--primary); color: white; }
        .btn-clear { background: #ef4444; color: white; }
        
        .history-item { background: #1e293b; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 12px; cursor: pointer; border-left: 3px solid var(--primary); }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="section">
            <h2>🎥 100个运镜技巧</h2>
            <h3>基础运镜</h3>
            <div class="tag-group" id="cam-basic"></div>
            <h3>组合运镜</h3>
            <div class="tag-group" id="cam-combo"></div>
            <h3>专业/电影级</h3>
            <div class="tag-group" id="cam-pro"></div>
            <h3>场景专属 (人像/产品/风景)</h3>
            <div class="tag-group" id="cam-scene"></div>
        </div>

        <div class="section">
            <h2>🎨 风格与约束</h2>
            <h3>推荐风格</h3>
            <div class="tag-group" id="style-tags"></div>
            <h3>画质必写句</h3>
            <div class="tag-group" id="quality-tags"></div>
            <h3>强制约束</h3>
            <div class="tag-group" id="const-tags"></div>
        </div>
    </div>

    <div class="main-panel">
        <div class="input-box">
            <h2>✍️ 提示词组装器 (遵循权重优先级)</h2>
            
            <label>1. 核心主体 (权重最高)</label>
            <input type="text" id="subject" placeholder="示例：20岁东亚淡颜女生，黑长直齐肩发..." oninput="update()">
            
            <label>2. 连续动作指令 (写清先后顺序)</label>
            <input type="text" id="action" placeholder="示例：缓步向前走，手臂自然摆动，发丝扬起..." oninput="update()">
            
            <label>3. 场景与光影细节</label>
            <input type="text" id="scene" placeholder="示例：黄昏日落逆光，金色丁达尔光效..." oninput="update()">

            <label>最终生成的 Seedance 2.0 指令</label>
            <textarea id="output" readonly></textarea>

            <div class="btn-group">
                <button class="btn btn-copy" onclick="copyResult()">复制完整指令</button>
                <button class="btn btn-clear" onclick="resetAll()">重置清空</button>
            </div>
        </div>

        <div class="section">
            <h2>🕒 最近生成记录</h2>
            <div id="history"></div>
        </div>
    </div>
</div>

<script>
    const data = {
        camBasic: ["慢推镜", "慢拉镜", "横摇镜", "竖摇镜", "环绕镜", "跟拍镜", "固定镜", "微距镜", "定格镜", "手持微抖"],
        camCombo: ["推拉结合", "跟拍+环绕", "升降+横摇", "环绕+慢推", "慢推+定格", "横摇+跟拍", "竖摇+慢拉", "微距+慢推", "固定+快切", "跟拍+慢拉"],
        camPro: ["希区柯克变焦", "一镜到底", "荷兰角", "升格慢动作", "匹配剪辑转场", "螺旋环绕", "俯冲运镜", "拉升运镜", "焦外虚化"],
        camScene: ["特写慢推(面部)", "近景环绕(人像)", "中景跟拍(走路)", "360度展示产品", "全景慢推(风景)", "俯冲+跟拍(剧情)"],
        styles: ["复古胶片风格", "日系清新风格", "赛博朋克风格", "电影感色彩", "柔光氛围", "低饱和质感"],
        quality: ["4K超高清", "60fps高帧率", "HDR", "细节丰富", "无噪点", "画面丝滑"],
        constraints: ["无变脸", "无肢体畸形", "无穿模", "无跳帧", "画面稳定无抖动", "角色全程一致"]
    };

    const state = { cam: [], style: [], quality: [], const: [] };

    function initTags() {
        renderTags('cam-basic', data.camBasic, 'cam');
        renderTags('cam-combo', data.camCombo, 'cam');
        renderTags('cam-pro', data.camPro, 'cam');
        renderTags('cam-scene', data.camScene, 'cam');
        renderTags('style-tags', data.styles, 'style');
        renderTags('quality-tags', data.quality, 'quality');
        renderTags('const-tags', data.constraints, 'const');
    }

    function renderTags(id, list, type) {
        const container = document.getElementById(id);
        container.innerHTML = list.map(item => `<span class="tag" onclick="toggleTag(this, '${type}', '${item}')">${item}</span>`).join('');
    }

    function toggleTag(el, type, val) {
        el.classList.toggle('active');
        const idx = state[type].indexOf(val);
        if (idx > -1) state[type].splice(idx, 1);
        else state[type].push(val);
        update();
    }

    function update() {
        const sub = document.getElementById('subject').value;
        const act = document.getElementById('action').value;
        const sce = document.getElementById('scene').value;
        
        let parts = [];
        if (sub) parts.push(`主体：${sub}`);
        if (act) parts.push(`动作：${act}`);
        if (state.cam.length) parts.push(`运镜：${state.cam.join('、')}`);
        if (sce) parts.push(`场景光影：${sce}`);
        if (state.style.length) parts.push(`风格：${state.style.join('、')}`);
        if (state.quality.length) parts.push(state.quality.join('、'));
        if (state.const.length) parts.push(`约束：${state.const.join('、')}`);

        document.getElementById('output').value = parts.join('，') + '。';
    }

    function copyResult() {
        const text = document.getElementById('output').value;
        if (!text) return;
        navigator.clipboard.writeText(text);
        
        const history = document.getElementById('history');
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = text.substring(0, 60) + '...';
        item.onclick = () => { navigator.clipboard.writeText(text); alert('已重新复制！'); };
        history.prepend(item);
        alert('指令已复制，请前往 Seedance 粘贴！');
    }

    function resetAll() {
        document.getElementById('subject').value = '';
        document.getElementById('action').value = '';
        document.getElementById('scene').value = '';
        document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
        state.cam = []; state.style = []; state.quality = []; state.const = [];
        update();
    }

    initTags();
</script>
</body>
</html>
