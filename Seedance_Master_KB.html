<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedance 2.0 智能分镜工作台</title>
    <style>
        :root {
            --primary: #8b5cf6; /* 紫色调，专业感 */
            --bg: #030712;
            --card: #111827;
            --border: #1f2937;
            --text: #f3f4f6;
            --accent: #10b981;
            --warning: #f59e0b;
        }
        body { font-family: 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1300px; display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }

        /* 左侧选择区 */
        .sidebar { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 15px; }
        h2 { font-size: 1.2rem; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .select-group { margin-bottom: 25px; }
        .group-title { font-size: 0.85rem; color: #9ca3af; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .opt-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .opt-btn { background: #1f2937; border: 1px solid transparent; padding: 10px; border-radius: 8px; color: white; cursor: pointer; font-size: 0.9rem; transition: 0.2s; text-align: center; }
        .opt-btn:hover { border-color: var(--primary); }
        .opt-btn.active { background: var(--primary); border-color: var(--primary); }

        /* 右侧操作区 */
        .main { display: flex; flex-direction: column; gap: 20px; }
        .section { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        @media (max-width: 600px) { .input-row { grid-template-columns: 1fr; } }
        
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.9rem; color: #9ca3af; }
        input, select, textarea { background: #030712; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; font-size: 0.95rem; }
        textarea { height: 180px; color: var(--accent); font-family: 'Courier New', monospace; line-height: 1.6; }

        /* 变量库标签区 */
        .variable-shelf { margin-top: 20px; }
        .tag-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag { background: #1e1b4b; border: 1px solid #312e81; padding: 4px 10px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .tag:hover { background: var(--primary); color: white; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; width: 100%; }
        .btn-copy { background: #059669; }

        .kb-tip { font-size: 0.8rem; color: #6b7280; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>🏗️ 脚本配置中心</h2>
        
        <div class="select-group">
            <div class="group-title">视频时长 (Duration)</div>
            <div class="opt-grid">
                <div class="opt-btn" onclick="setDuration('5s', this)">5 秒</div>
                <div class="opt-btn" onclick="setDuration('10s', this)">10 秒</div>
                <div class="opt-btn active" onclick="setDuration('15s', this)">15 秒</div>
            </div>
        </div>

        <div class="select-group">
            <div class="group-title">视频类型 (Type)</div>
            <div class="opt-grid" style="grid-template-columns: 1fr;">
                <div class="opt-btn active" onclick="setType('漫剧', this)">漫剧</div>
                <div class="opt-btn" onclick="setType('微短剧', this)">微短剧</div>
                <div class="opt-btn" onclick="setType('电商产品展示', this)">电商产品展示</div>
                <div class="opt-btn" onclick="setType('TVC广告', this)">TVC广告</div>
                <div class="opt-btn" onclick="setType('科普短片', this)">科普短片</div>
            </div>
        </div>

        <div class="kb-tip">
            💡 <strong>核心原则：</strong><br>
            时长决定分镜上限。Seedance 2.0 建议 15s 适配 6-10 个分镜以保证节奏感。
        </div>
    </div>

    <div class="main">
        <div class="section">
            <h2>📝 核心剧情与素材定义</h2>
            <div class="input-row">
                <div class="field">
                    <label>核心主题 (情节/卖点)</label>
                    <input type="text" id="subject" placeholder="例如：比熊雪宝在夕阳下奔跑" oninput="generate()">
                </div>
                <div class="field">
                    <label>角色/品牌名称</label>
                    <input type="text" id="role" placeholder="例如：雪宝" oninput="generate()">
                </div>
            </div>

            <div class="input-row">
                <div class="field">
                    <label>@素材1用途</label>
                    <input type="text" id="mat1" value="首帧画面参考" oninput="generate()">
                </div>
                <div class="field">
                    <label>@素材2用途</label>
                    <input type="text" id="mat2" value="人物情绪/动作参考" oninput="generate()">
                </div>
            </div>

            <div class="variable-shelf" id="shelf">
                </div>
        </div>

        <div class="section">
            <h2>🚀 Seedance 2.0 进阶提示词工程指令</h2>
            <textarea id="output" readonly></textarea>
            <button class="btn-main btn-copy" onclick="copyResult()">一键复制并发送给大模型</button>
        </div>
    </div>
</div>

<script>
    const variables = {
        "镜头类型": ["特写", "近景", "中景", "全景", "俯拍", "仰拍"],
        "运镜方式": ["推近", "拉远", "环绕", "平稳跟拍", "一镜到底", "希区柯克变焦"],
        "画风/场景": ["1980年代写实漫", "国漫水墨风", "电影级写实", "古风唯美", "赛博朋克"],
        "光影/色彩": ["Golden Hour 逆光", "柔光氛围", "高动态范围", "暖调低饱和", "胶片质感"]
    };

    let config = { duration: '15s', type: '漫剧' };

    function setDuration(val, el) {
        document.querySelectorAll('.select-group:nth-child(2) .opt-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        config.duration = val;
        generate();
    }

    function setType(val, el) {
        document.querySelectorAll('.select-group:nth-child(3) .opt-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        config.type = val;
        generate();
    }

    function renderShelf() {
        const shelf = document.getElementById('shelf');
        shelf.innerHTML = Object.entries(variables).map(([key, tags]) => `
            <div class="group-title" style="margin-top:10px">${key}</div>
            <div class="tag-wrap">
                ${tags.map(t => `<span class="tag" onclick="addTag('${t}')">${t}</span>`).join('')}
            </div>
        `).join('');
    }

    function addTag(val) {
        const sub = document.getElementById('subject');
        sub.value += (sub.value ? '，' : '') + val;
        generate();
    }

    function generate() {
        const sub = document.getElementById('subject').value || '[待填核心主题]';
        const role = document.getElementById('role').value || '[角色名]';
        const m1 = document.getElementById('mat1').value;
        const m2 = document.getElementById('mat2').value;

        let prompt = `请基于 Seedance 2.0 使用规则，为我生成精细化视频提示词：
1. 素材指定：@素材1 为 ${m1}，@素材2 为 ${m2}。
2. 视频时长：${config.duration}。
3. 视频类型：${config.type}。
4. 核心内容：${sub}，主角为 ${role}。
5. 结构要求：按时长做分镜设计，标注序号、镜头类型、运镜方式、画面内容及动作。
   - 漫剧/短剧需 4-8 个镜头；
   - 分镜衔接使用【硬切/闪切/叠化】；
   - 包含【音效/配音】建议；
6. 风格细节：强调 35mm 电影镜头感，极浅景深 (F/1.8)，写实皮肤/毛发质感，画面稳定无抖动。
7. 提示词输出需包含：素材用途 + 分镜详情 + 衔接方式 + 风格光影细节。
请直接按照 Seedance 2.0 提示词工程进阶版格式输出。`;

        document.getElementById('output').value = prompt;
    }

    function copyResult() {
        const out = document.getElementById('output');
        out.select();
        document.execCommand('copy');
        alert('✅ 指令已复制！请直接发给大模型（如 Gemini/ChatGPT）生成分镜脚本。');
    }

    // 初始化
    renderShelf();
    generate();
</script>

</body>
</html>
